# /etc/nginx/conf.d/00-default-catch-all.conf
# Catches all requests that don't match any other vhost.
# Browsers get a teapot page; CLI tools get a plain-text 418 response.

map $http_accept $is_browser {
    default 0;
    ~*text/html 1;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    # reuseport is only set on the default_server — nginx requires it on exactly
    # one server block per ip:port, and all other vhosts share that socket.
    listen 443 quic reuseport default_server;
    listen [::]:443 quic reuseport default_server;

    http2 on;
    http3 on;

    server_name _;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    root /var/www/teapot;
    index index.html;

    location / {
        if ($is_browser = 0) {
            return 418 "Error occurred. Please visit https://example.com for more information\n";
        }
        try_files $uri $uri/ =418;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    if ($is_browser = 1) {
        return 301 https://$host$request_uri;
    }

    return 418 "Error occurred. Please visit https://example.com for more information\n";
}
