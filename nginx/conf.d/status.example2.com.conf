# Status page on a secondary domain — replace example2.com with your domain.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic;
    listen [::]:443 quic;

    http2 on;
    http3 on;

    server_name status.example2.com;

    ssl_certificate     /etc/letsencrypt/live/status.example2.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/status.example2.com/privkey.pem;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout — Uptime Kuma uses persistent WebSocket connections
        proxy_read_timeout 7d;
        proxy_buffering    off;

        # Never compress proxied requests as this may kill nginx workers
        zstd off;
        gzip off;
    }
}
