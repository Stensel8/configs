# /etc/nginx/conf.d/admin.example.com.conf
# Admin interface – reverse-proxy to the local Cockpit instance.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    # No reuseport here — already claimed by the default_server.
    listen 443 quic;
    listen [::]:443 quic;

    http2 on;
    http3 on;

    server_name admin.example.com;

    ssl_certificate     /etc/letsencrypt/live/admin.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.example.com/privkey.pem;

    # TLS 1.3 only for admin
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    quic_retry on;
    quic_gso   on;
    ssl_early_data off;

    add_header Alt-Svc                   'h3=":443"; ma=86400' always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Server                    "nginx";

    client_max_body_size 100M;

    location / {
        proxy_pass         https://127.0.0.1:9090;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering         off;
        proxy_request_buffering off;

        # Never compress proxied requests as this may kill nginx workers
        zstd off;
        gzip off;

        proxy_read_timeout    2h;
        proxy_send_timeout    2h;
        proxy_connect_timeout 30s;
    }
}
